name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'            # stable: v0.5.0
      - 'v[0-9]+.[0-9]+.[0-9]+[ab][0-9]+'  # alpha/beta: v0.6.0a1, v0.6.0b1
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'    # release candidate: v0.6.0rc1
      - 'v[0-9]+.[0-9]+.[0-9]+-*'          # other pre-releases (testpypi, etc.)

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_prerelease: ${{ steps.extract.outputs.is_prerelease }}
      is_testpypi: ${{ steps.extract.outputs.is_testpypi }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for hatch-vcs to determine version from tags

      - name: Extract version from tag
        id: extract
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Detect testpypi tags (e.g., v0.1.0-testpypi.1) — publish to TestPyPI only
          if [[ "$VERSION" =~ -testpypi ]]; then
            echo "is_testpypi=true" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a TestPyPI test release: $VERSION"
          # Detect PEP 440 pre-release suffixes: a1, b1, rc1, .dev1
          elif [[ "$VERSION" =~ (a|b|rc)[0-9]+$ ]] || [[ "$VERSION" =~ \.dev[0-9]+$ ]]; then
            echo "is_testpypi=false" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release: $VERSION"
          # Catch any remaining dash-suffixed pre-releases for backward compatibility
          elif [[ "$VERSION" =~ -[a-zA-Z] ]]; then
            echo "is_testpypi=false" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release: $VERSION"
          else
            echo "is_testpypi=false" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "This is a stable release: $VERSION"
          fi

  build-python-package:
    name: Build Python Package
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for hatch-vcs to determine version from tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install all frontend dependencies
        run: npm ci

      - name: Build team frontend
        working-directory: src/open_agent_kit/features/team/daemon/ui
        run: npm run build

      - name: Verify team frontend assets
        run: |
          test -f src/open_agent_kit/features/team/daemon/static/index.html
          echo "Team frontend assets built successfully:"
          ls -lh src/open_agent_kit/features/team/daemon/static/

      - name: Build swarm frontend
        working-directory: src/open_agent_kit/features/swarm/daemon/ui
        run: npm run build

      - name: Verify swarm frontend assets
        run: |
          test -f src/open_agent_kit/features/swarm/daemon/static/index.html
          echo "Swarm frontend assets built successfully:"
          ls -lh src/open_agent_kit/features/swarm/daemon/static/

      - name: Clean frontend node_modules
        run: |
          rm -rf node_modules
          echo "Removed root node_modules to prevent leaking into wheel"

      - name: Build skill assets
        run: |
          pip install -e .
          python scripts/build_skill_assets.py

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling hatch-vcs

      - name: Build package
        run: |
          python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          python -c "import open_agent_kit; print(f'Installed version: {open_agent_kit.__version__}')"
          oak version

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-packages
          path: dist/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build-python-package]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Python packages
        uses: actions/download-artifact@v8
        with:
          name: python-packages
          path: release-files

      - name: List artifacts
        run: |
          echo "Release artifacts:"
          ls -lh release-files/

      - name: Generate release notes
        id: notes
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
          IS_PRERELEASE: ${{ needs.validate-tag.outputs.is_prerelease }}
        run: |
          # Get commits since last tag (sanitize output to prevent injection)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi

          if [ "$IS_PRERELEASE" = "true" ]; then
            cat > release-notes.md <<NOTES_EOF
          ## ⚠️ This is a pre-release

          This version is a pre-release and may contain bugs or incomplete features.
          Please report issues at https://github.com/goondocks-co/open-agent-kit/issues

          ## What's Changed

          ${COMMITS}

          ## Install / Upgrade

          The beta formula installs the binary as \`oak-beta\` so stable and beta can coexist.

          \`\`\`bash
          # Homebrew (macOS) — installs as \`oak-beta\`
          brew install goondocks-co/oak/oak-ci-beta

          # pipx — installs as \`oak-beta\`
          pipx install oak-ci --python python3.13 --pip-args='--pre' --suffix=-beta

          # uv
          uv tool install oak-ci --python python3.13 --prerelease=allow

          # pip
          pip install oak-ci --pre
          \`\`\`

          After installing, initialise your project with the beta binary:

          \`\`\`bash
          oak-beta init
          \`\`\`

          ## Documentation

          - [README](https://github.com/goondocks-co/open-agent-kit/blob/main/README.md)
          - [Quick Start Guide](https://github.com/goondocks-co/open-agent-kit/blob/main/QUICKSTART.md)
          NOTES_EOF
          else
            cat > release-notes.md <<NOTES_EOF
          ## What's Changed

          ${COMMITS}

          ## Install and Upgrade

          \`\`\`bash
          # Install via Homebrew (macOS — handles Python version automatically)
          brew install goondocks-co/oak/oak-ci

          # Or via pipx (requires Python 3.12-3.13)
          pipx install oak-ci --python python3.13

          # Or via uv (requires Python 3.12-3.13)
          uv tool install oak-ci --python python3.13

          # Or via pip
          pip install oak-ci

          # Initialize in your project
          cd /path/to/your/project
          oak init

          # Upgrade an existing installation
          brew upgrade oak-ci              # Homebrew
          pipx upgrade oak-ci              # pipx
          uv tool upgrade oak-ci           # uv
          oak upgrade                      # in-place upgrade
          \`\`\`

          ## Documentation

          - [README](https://github.com/goondocks-co/open-agent-kit/blob/main/README.md)
          - [Quick Start Guide](https://github.com/goondocks-co/open-agent-kit/blob/main/QUICKSTART.md)
          NOTES_EOF
          fi
          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' release-notes.md

          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ needs.validate-tag.outputs.version }}
          body_path: release-notes.md
          files: release-files/*
          draft: false
          prerelease: ${{ needs.validate-tag.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release summary
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
          IS_PRERELEASE: ${{ needs.validate-tag.outputs.is_prerelease }}
        run: |
          echo "## Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Pre-release:** $IS_PRERELEASE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh release-files/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pipx install oak-ci" >> $GITHUB_STEP_SUMMARY
          echo "oak init" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-tag, create-release]
    if: needs.validate-tag.outputs.is_testpypi == 'false'
    environment: pypi
    steps:
      - name: Download Python packages
        uses: actions/download-artifact@v8
        with:
          name: python-packages
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [validate-tag, create-release]
    if: needs.validate-tag.outputs.is_testpypi == 'true'
    environment: testpypi
    steps:
      - name: Download Python packages
        uses: actions/download-artifact@v8
        with:
          name: python-packages
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [validate-tag, publish-pypi]
    if: >-
      needs.validate-tag.outputs.is_testpypi == 'false' &&
      needs.validate-tag.outputs.is_prerelease == 'false'
    steps:
      - name: Trigger tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          gh workflow run update-formula.yml \
            -R goondocks-co/homebrew-oak \
            -f version="$VERSION" \
            -f formula="oak-ci"

  update-homebrew-beta:
    name: Update Homebrew Beta Tap
    runs-on: ubuntu-latest
    needs: [validate-tag, publish-pypi]
    if: >-
      needs.validate-tag.outputs.is_testpypi == 'false' &&
      needs.validate-tag.outputs.is_prerelease == 'true'
    steps:
      - name: Trigger beta tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          gh workflow run update-formula.yml \
            -R goondocks-co/homebrew-oak \
            -f version="$VERSION" \
            -f formula="oak-ci-beta"
