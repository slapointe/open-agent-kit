version: 1.4.3.dev51+gf8d2c9158.d20260306
agents:
- vscode-copilot
- opencode
- codex
- gemini
- windsurf
- cursor
- claude
rfc:
  directory: oak/rfc
  template: engineering
  validate_on_create: true
constitution:
  directory: oak
languages:
  installed: [javascript, python, typescript]
skills:
  installed:
  - project-governance
  - context-engineering
  - oak
  - swarm
  auto_install: true
team:
  agents:
    enabled: true
    max_turns: 50
    timeout_seconds: 600
    scheduler_interval_seconds: 60
    executor_cache_size: 100
    background_processing_interval_seconds: 60
    background_processing_workers: 2
  session_quality:
    min_activities: 3
    stale_timeout_seconds: 3600
  team:
    sync_interval_seconds: 3
    project_slug: null
    relay_worker_url: https://oak-relay-open-agent-kit.openagentkit.app
    relay_worker_name: null
  backup:
    on_upgrade: true
  auto_resolve:
    enabled: true
    similarity_threshold: 0.8
    similarity_threshold_no_context: 0.88
    search_limit: 10
  governance:
    enabled: false
    log_allowed: false
    retention_days: 30
    rules: []
    data_collection:
      sync_observations: true
      federated_tools: true
  exclude_patterns:
  - .git
  - .git/**
  - .oak
  - .oak/**
  - .agents/skills
  - .claude/commands
  - .claude/settings.json
  - .claude/skills
  - .codex/config.toml
  - .codex/prompts
  - .cursor/commands
  - .cursor/mcp.json
  - .cursor/settings.json
  - .cursor/skills
  - .gemini/commands
  - .gemini/settings.json
  - .github/agents
  - .mcp.json
  - .opencode/commands
  - .vscode/mcp.json
  - .vscode/settings.json
  - .windsurf/commands
  - .windsurf/settings.json
  - opencode.json
  - .claude/settings.local.json
  - .cursor/hooks.json
  - .cursor/hooks
  - .cursor/hooks/**
  - node_modules
  - node_modules/**
  - '**/node_modules'
  - '**/node_modules/**'
  - __pycache__
  - __pycache__/**
  - .mypy_cache
  - .mypy_cache/**
  - .pytest_cache
  - .pytest_cache/**
  - .ruff_cache
  - .ruff_cache/**
  - htmlcov
  - htmlcov/**
  - .venv
  - .venv/**
  - venv
  - venv/**
  - .env
  - .env.*
  - '*.env'
  - '*.pem'
  - '*.key'
  - '*.crt'
  - '*.p12'
  - '*.pfx'
  - '*.jks'
  - '*.keystore'
  - '*.pyc'
  - '*.pyo'
  - '*.min.js'
  - '*.min.css'
  - '*.map'
  - '*.lock'
  - package-lock.json
  - yarn.lock
  - pnpm-lock.yaml
  - dist/**
  - build/**
  - .next/**
  - coverage/**
  - '*.egg-info/**'
  - translations/**
  - locales/**
  - locale/**
  - i18n/**
  - l10n/**
  - '*.po'
  - '*.pot'
  - '*.mo'
  cli_command: oak-dev
swarm:
  swarm_url: https://oak-swarm-oss-swarm.openagentkit.app
