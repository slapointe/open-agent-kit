# =============================================================================
# Built-in Task: Memory Consolidation
# =============================================================================
# Task for: maintenance agent
#
# The "sleep cycle" for OAK's brain. Consolidates duplicate observations,
# resolves irrelevant memories, and synthesizes cross-session patterns.
#
# Output is captured in agent_runs.result — no files written to project.
# =============================================================================

name: memory-consolidation
display_name: "Memory Consolidation"
agent_type: maintenance
is_builtin: true
description: >
  Consolidates duplicate and similar observations, resolves irrelevant
  memories, and synthesizes cross-session patterns into new wisdom.
  The "sleep cycle" for OAK's brain.

default_task: |
  Perform a memory consolidation cycle on the project's observation store.
  Your output serves as the decisions report — it will be captured in the
  run record. Do NOT write any files.

  IMPORTANT: This task uses a budget-aware approach. Each phase has a turn
  budget (1 turn = 1 LLM round-trip). Combine multiple tool calls into
  single turns wherever possible. Total budget: ~45 turns.

  ## Phase 1 — Inventory (budget: 3 turns)

  Use `ci_project_stats` and a single `ci_query` call to get all baselines
  in one shot:

  ```sql
  SELECT
    memory_type,
    status,
    COUNT(*) as cnt
  FROM observations
  GROUP BY memory_type, status
  ORDER BY memory_type, status
  ```

  Record these numbers — you will compare before/after at the end.

  ## Phase 2 — Duplicate Detection (budget: 10 turns)

  Use a hybrid SQL + sampled semantic approach. Do NOT iterate over every
  observation individually.

  ### Layer A — SQL clustering (1-2 turns)

  Run these two `ci_query` calls (can be parallel):

  1. Same-file/same-type clusters:
     ```sql
     SELECT file_path, memory_type, COUNT(*) as cnt,
            GROUP_CONCAT(id, ',') as ids
     FROM observations
     WHERE status = 'active' AND file_path IS NOT NULL
     GROUP BY file_path, memory_type
     HAVING COUNT(*) > 1
     ORDER BY cnt DESC
     LIMIT 50
     ```

  2. Near-verbatim text duplicates (across any file):
     ```sql
     SELECT a.id as id_a, b.id as id_b,
            a.observation as obs_a, b.observation as obs_b,
            a.file_path as file_a, b.file_path as file_b
     FROM observations a
     JOIN observations b ON a.id < b.id
       AND SUBSTR(a.observation, 1, 80) = SUBSTR(b.observation, 1, 80)
     WHERE a.status = 'active' AND b.status = 'active'
     LIMIT 50
     ```

  Group the SQL results into consolidation clusters.

  ### Layer B — Sampled semantic search (~5 turns)

  For each memory type (discovery, gotcha, decision, bug_fix, trade_off):
  1. Pick 1 representative observation from each of the top 5 largest SQL
     clusters for that type. If fewer than 5 clusters, pick randomly from
     active observations of that type.
  2. Run `ci_search(query=OBSERVATION_TEXT, search_type="memory")` on those
     ~5 samples per type (~25 searches total, batched across turns).
  3. Add any new duplicate pairs found to the consolidation clusters.

  Skip types with fewer than 5 active observations — not worth searching.

  ## Phase 3 — Consolidation (budget: 15 turns)

  Act on the clusters found in Phase 2. Process clusters largest-first.

  For each cluster:
  1. Read all observations in the cluster carefully
  2. If truly redundant (same insight, different wording):
     - Keep the most comprehensive version
     - Supersede the rest via `ci_resolve(id=ID, status="superseded",
       reason="Consolidated: duplicate of [kept_id]")`
     - Batch multiple `ci_resolve` calls in a single turn
  3. If complementary (different facets of the same insight):
     - Create a new merged observation via `ci_remember(observation=MERGED_TEXT,
       memory_type=TYPE, context=CONTEXT)`
     - Supersede the originals, referencing the new merged observation
  4. Record each decision and your reasoning

  If you approach the turn budget, stop and note remaining clusters for
  the next consolidation run.

  ## Phase 4 — Relevance Review (budget: 10 turns)

  Batch file-existence checks instead of checking one-by-one.

  1. Single SQL query to get all distinct file paths from active observations:
     ```sql
     SELECT DISTINCT file_path
     FROM observations
     WHERE status = 'active' AND file_path IS NOT NULL
     ORDER BY file_path
     ```

  2. Use a single `Glob` call with pattern `**/*` or targeted patterns to
     batch-check which files exist in the project.

  3. Compare the two lists. For observations referencing files that no longer
     exist, resolve them in bulk:
     - `ci_resolve(id=ID, status="resolved",
       reason="Referenced file no longer exists")`
     - Batch multiple resolves per turn.

  ## Phase 5 — Cross-Session Pattern Recognition (budget: 5 turns)

  Analyze recent sessions for recurring themes:
  1. Use `ci_sessions(limit=10)` to review recent sessions
  2. Single SQL query for pattern detection:
     ```sql
     SELECT file_path, COUNT(DISTINCT session_id) as session_count
     FROM observations
     WHERE status = 'active' AND file_path IS NOT NULL
       AND created_at > date('now', '-30 days')
     GROUP BY file_path
     HAVING COUNT(DISTINCT session_id) >= 3
     ORDER BY session_count DESC
     LIMIT 10
     ```
  3. If a strong pattern exists and is NOT already captured as an observation:
     - Create a new observation via `ci_remember()` with synthesized wisdom
     - Use memory_type="discovery" for patterns, "gotcha" for recurring issues

  ## Phase 6 — Decisions Summary (budget: 1 turn)

  End with a structured decisions report. This is your final output and will
  be stored in the run record.

  Structure your report as:

  ### Consolidation Decisions
  For each consolidation action:
  - What observations were consolidated
  - WHY they were consolidated (not just "they were similar")
  - What was kept/created vs superseded

  ### Relevance Decisions
  For each resolution:
  - What observation was resolved
  - WHY it was no longer relevant
  - What evidence supported the decision

  ### New Wisdom Created
  For each new observation:
  - The synthesized insight
  - What sources contributed to it
  - WHY this pattern is worth capturing

  ### Before/After Metrics
  - Observations before: N (by type and status)
  - Observations after: N (by type and status)
  - Net change: +N created, -N superseded, -N resolved

# Schedule: uncomment to enable periodic consolidation
# schedule:
#   cron: "0 3 * * SUN"
#   description: "Weekly memory consolidation every Sunday at 3 AM"

execution:
  timeout_seconds: 900
  max_turns: 200
  model: claude-sonnet-4-6

schema_version: 1
