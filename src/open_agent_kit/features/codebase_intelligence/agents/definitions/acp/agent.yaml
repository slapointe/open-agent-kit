# ACP Interactive Agent
#
# An interactive coding agent for editor integrations via ACP.
# The daemon manages the full session lifecycle — prompts, responses,
# tool usage, observations, activity recording.

name: oak
display_name: "OAK Agent (ACP)"
internal: true
description: >
  Interactive coding agent for editor integrations via the Agent Client
  Protocol. Uses CI for full project context including semantic search,
  memories, and session history.

execution:
  max_turns: 100
  timeout_seconds: 3600
  permission_mode: acceptEdits

allowed_tools:
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - Bash

disallowed_tools:
  - Task

ci_access:
  code_search: true
  memory_search: true
  session_history: true
  project_stats: true
  sql_query: true
  memory_write: true
